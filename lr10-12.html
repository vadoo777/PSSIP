<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script>
        function task1() {
            const d = new Date();
            alert("Число месяца: " + d.getDate());
        }
    </script>
</head>
<body>
    
    
    <div class="task">
        <h3>Задание 1</h3>
        <button onclick="task1()">Выполнить</button>
    </div>
    
    <div class="task">
        <h3>Задание 2</h3>
        <button onclick="task2()">Выполнить</button>
        <div id="r2"></div>
    </div>
    
    <div class="task">
        <h3>Задание 3</h3>
        <button onclick="task3()">Выполнить</button>
        <div id="r3"></div>
    </div>
    
    <div class="task">
    <h3>Задание 4</h3>
    <input type="number" id="x" placeholder="x">
    <input type="number" id="a" placeholder="a">
    <button onclick="task4()">Выполнить</button>
    <div id="r4"></div>
</div>
    
    <div class="task">
        <h3>Задание 5</h3>
        <button onclick="task5()">Выполнить</button>
        <div id="r5"></div>
    </div>
    
    <script>
        function task2() {
            let s = "Климович Вадим", n = 4, i = 1, out = "";
            do { out += i + ". " + s + "<br>"; i++; } while (i <= n + 5);
            document.getElementById("r2").innerHTML = out;
        }
        
        function task3() {
            const arr = [3, 8, 15, 22, 7, 10];
            let sum = 0;
            arr.forEach(x => { if (x % 2 === 0) sum += x; });
            document.getElementById("r3").innerHTML = "Массив: " + arr + "<br>Сумма чётных: " + sum;
        }
        
        function task5() {
            const s1 = "Я люблю Беларусь", s2 = "Я учусь в Политехническом колледже";
            document.getElementById("r5").innerHTML = 
                "S1 длина: " + s1.length + "<br>" +
                "S2 : " + s2.replace("учусь", "").trim() + "<br>" +
                "S1 : " + s1.replace(/ю/g, "*");
        }
    </script>
    <script src="math.js"></script>
</body>
</html>
