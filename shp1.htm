<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Портфолио - Климович Вадим Русланович</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }
        form {
            background: #f9f9f9;
            padding: 20px;
            max-width: 400px;
        }
        input {
            width: 100%;
            margin-bottom: 15px;
            padding: 5px;
        }
        button {
            padding: 8px 15px;
            background: #ddd;
            border: 1px solid #999;
            cursor: pointer;
        }
        footer {
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <h1>Запись на консультацию</h1>

    <form>
        <label>Имя:</label><br>
        <input type="text" name="name"><br>

        <label>Фамилия:</label><br>
        <input type="text" name="surname"><br>

        <label>Номер телефона:</label><br>
        <input type="tel" name="phone"><br>

        <label>Электронная почта:</label><br>
        <input type="email" name="email"><br>

        <button type="submit">Записаться</button>
    </form>

    <footer>
        <p>© Климович Вадим Русланович</p>
    </footer>
</body>
</html>
