<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заказа - Mr Braun</title>
    <link rel="stylesheet" href="lrz4.css">
</head>
<body>
    <div class="app-wrapper">
        <div class="logo-container">
            <div class="css-hat"></div>
            <div class="logo-text">
                <span class="logo-mr">Mr</span>
                <span class="logo-braun">Braun</span>
            </div>
        </div>

        <h1 class="main-title">Оформление заказа</h1>

        <div class="form-container">
            <div class="form-header">Форма заказа</div>
            
            <form class="form-body" action="#" method="POST">
                
                <div class="form-group">
                    <label class="form-label" for="fio">ФИО <span class="required">*</span></label>
                    <input type="text" id="fio" name="fio" class="form-input" placeholder="Введите ваше имя" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="example@mail.ru" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="phone">Телефон <span class="required">*</span></label>
                    <input type="tel" id="phone" name="phone" class="form-input" placeholder="+7 (___) ___-__-__" required>
                </div>

                <div class="form-group textarea-group">
                    <label class="form-label" for="comments">Комментарии</label>
                    <textarea id="comments" name="comments" class="form-textarea" placeholder="Ваши пожелания к заказу..."></textarea>
                </div>

                <div class="submit-btn-wrapper">
                    <button type="submit" class="submit-btn">Отправить</button>
                </div>
            </form>
        </div>

        <div class="corner-ribbon">
            <div class="ribbon-bar"></div>
        </div>
    </div>
</body>
</html>
